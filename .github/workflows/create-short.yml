name: Create Short from Issue

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue番号"
        required: true
        type: number
      issue_title:
        description: "Issueタイトル([Short] を除いた本文)"
        required: true
        type: string
      issue_body:
        description: "Issue本文"
        required: true
        type: string

defaults:
  run:
    shell: bash

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  create-short:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'short'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - uses: ./.github/actions/playwright-setup

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write

      - name: Generate Slug and Date
        id: meta
        env:
          ISSUE_TITLE: ${{ github.event_name == 'workflow_dispatch' && inputs.issue_title || github.event.issue.title }}
        run: |
          # タイトルから"[Short] "を除去
          TITLE="${ISSUE_TITLE#\[Short\] }"

          # タイトルを英語翻訳してスラグ化
          SLUG=$(bun run scripts/translate-title-to-slug.ts "$TITLE")
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

          # JST日付取得
          DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          echo "date=$DATE" >> "$GITHUB_OUTPUT"

          echo "Generated Slug: $SLUG"
          echo "Date (JST): $DATE"

      - name: Extract Issue Content
        id: issue
        env:
          ISSUE_BODY: ${{ github.event_name == 'workflow_dispatch' && inputs.issue_body || github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event_name == 'workflow_dispatch' && inputs.issue_title || github.event.issue.title }}
        run: |
          # タイトルはIssueタイトルから"[Short] "を除去
          TITLE="${ISSUE_TITLE#\[Short\] }"

          # 本文を抽出(### 本文 セクション以降、確認事項の前まで)
          # 最初と最後の空行のみ削除、それ以外はそのまま保持
          CONTENT=$(echo "$ISSUE_BODY" | awk '/^### 本文$/,/^### 確認事項$/ {
            if ($0 !~ /^### 本文$/ && $0 !~ /^### 確認事項$/) print
          }' | sed '1{/^$/d}' | sed -e :a -e '/^\n*$/{$d;N;ba' -e '}')

          # マルチライン対応
          {
            echo "title<<EOF"
            echo "$TITLE"
            echo "EOF"
            echo "content<<EOF"
            echo "$CONTENT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Short File
        env:
          SLUG: ${{ steps.meta.outputs.slug }}
          DATE: ${{ steps.meta.outputs.date }}
          TITLE: ${{ steps.issue.outputs.title }}
          CONTENT: ${{ steps.issue.outputs.content }}
        run: |
          # ディレクトリ存在確認
          mkdir -p contents/shorts

          # Markdownファイル作成
          cat > "contents/shorts/${SLUG}.md" << EOF
          ---
          title: "${TITLE}"
          date: ${DATE}
          ---

          ${CONTENT}
          EOF

          echo "Created: contents/shorts/${SLUG}.md"
          cat "contents/shorts/${SLUG}.md"

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        env:
          SLUG: ${{ steps.meta.outputs.slug }}
          TITLE: ${{ steps.issue.outputs.title }}
          ISSUE_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.issue_number || github.event.issue.number }}
        with:
          token: ${{ steps.generate-token.outputs.token }}
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          commit-message: |
            Add short: ${{ steps.issue.outputs.title }}

            Issue: #${{ github.event_name == 'workflow_dispatch' && inputs.issue_number || github.event.issue.number }}
            Slug: ${{ steps.meta.outputs.slug }}
          branch: short/${{ steps.meta.outputs.slug }}
          delete-branch: true
          title: "📝 Short: ${{ steps.issue.outputs.title }}"
          body: |
            ## Summary

            新しいShortを追加します。

            ## Details

            - **Slug**: `${{ steps.meta.outputs.slug }}`
            - **File**: `contents/shorts/${{ steps.meta.outputs.slug }}.md`

            Closes #${{ github.event_name == 'workflow_dispatch' && inputs.issue_number || github.event.issue.number }}

            ---

            🤖 This PR was automatically created by GitHub Actions.
          labels: short
          assignees: ${{ github.event_name == 'workflow_dispatch' && github.actor || github.event.issue.user.login }}
