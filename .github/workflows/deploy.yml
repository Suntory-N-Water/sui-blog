name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  pull_request:

defaults:
  run:
    shell: bash

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy Preview
    if: github.ref != 'refs/heads/main'
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - uses: ./.github/actions/playwright-setup

      - name: Build Project Artifacts
        run: bun run build

      - name: Enable preview URLs
        run: |
          SCRIPT_NAME="sui-tech-blog"
          API_BASE="https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers"

          curl -sf -X POST \
            "$API_BASE/scripts/$SCRIPT_NAME/subdomain" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"enabled": true, "previews_enabled": true}'

          echo "Preview URLs enabled"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers (Preview)
        id: deploy
        run: |
          # Use wrangler versions upload with a stable alias for the PR
          # This generates a URL like: https://pr-<number>-<worker-name>.<subdomain>.workers.dev
          DEPLOY_OUTPUT=$(bunx wrangler versions upload --preview-alias "pr-${{ github.event.pull_request.number }}" 2>&1)
          echo "$DEPLOY_OUTPUT"

          # Extract the Version Preview URL
          # Output format usually contains: "Worker Version Preview URL: https://..."
          PREVIEW_URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'https://[a-zA-Z0-9-]+\.[a-zA-Z0-9-]+\.workers\.dev' | head -n 1)

          if [ -z "$PREVIEW_URL" ]; then
            echo "::error::Could not extract preview URL from deployment output"
            exit 1
          fi

          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment Preview URL on PR
        if: github.event_name == 'pull_request'
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "### Preview Deployment

          ✅ Deployed to Cloudflare Workers (Preview Environment)

          **Preview URL**: ${PREVIEW_URL}

          Note: This is an ephemeral version. Access the worker via the link above."
        env:
          GH_TOKEN: ${{ github.token }}
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}

  deploy-production:
    name: Deploy Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - uses: ./.github/actions/playwright-setup

      - name: Build Project Artifacts
        run: bun run build

      - name: Deploy to Cloudflare Workers (Production)
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Disable preview URLs
        continue-on-error: true
        run: |
          SCRIPT_NAME="sui-tech-blog"
          API_BASE="https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers"

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "$API_BASE/scripts/$SCRIPT_NAME/subdomain" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"enabled": true, "previews_enabled": false}')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Preview URLs disabled (HTTP $HTTP_CODE)"
          else
            echo "::warning::Failed to disable preview URLs (HTTP $HTTP_CODE)"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
